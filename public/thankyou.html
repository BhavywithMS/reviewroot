<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You!</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <div class="container text-center">
    <div class="card shadow p-5" style="max-width: 500px; margin: auto;">
      <div class="mb-4">
        <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
      </div>
      <h2 class="mb-3">Thank You!</h2>
      <p class="text-muted">Your feedback for <strong id="productName"></strong> has been submitted.</p>
      <a href="reviewer-dashboard.html" class="btn btn-primary">Back to Home</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('productName').textContent = urlParams.get('product') || 'the product';
  </script>

</body>

</html>
