<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give Customer Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .star-rating { font-size: 2rem; cursor: pointer; }
    .star-rating span { color: #ddd; }
    .star-rating span:hover, .star-rating span.active { color: #ffc107; }
    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="text-center mb-4">
        <h2 id="pageTitle">Give Review</h2>
        <p class="text-muted">Share your experience with this product!</p>
      </div>

      <!-- Login/Register Section for Customer -->
      <div id="authSection" class="card mb-4">
        <div class="card-body p-4">
          <h5 class="mb-3"><i class="bi bi-person me-2"></i>Customer Login / Register</h5>
          <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane">Login</button></li>
            <li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane">Register</button></li>
          </ul>
          
          <div class="tab-content">
            <div class="tab-pane fade show active" id="login-pane">
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
              </form>
            </div>
            
            <div class="tab-pane fade" id="register-pane">
              <form id="registerForm">
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-success">Create Account</button>
              </form>
            </div>
          </div>
          
          <div id="authError" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>

      <!-- Reviews Section -->
      <div id="reviewsSection" class="mb-4" style="display:none;">
        <h5>What others say</h5>
        <div id="reviewsList"></div>
      </div>

      <!-- Feedback Form Section -->
      <div id="feedbackSection" class="form-section card">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between mb-3">
            <span id="reviewerInfo"></span>
            <button class="btn btn-sm btn-outline-secondary" onclick="logoutReviewer()">Logout</button>
          </div>
          
          <form id="feedbackForm">
            <div class="mb-4 text-center">
              <label class="form-label d-block">Your Rating</label>
              <div class="star-rating" id="starContainer">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
              </div>
              <input type="hidden" id="rating" required />
            </div>

            <div class="mb-4">
              <label class="form-label">Your Review</label>
              <textarea class="form-control" id="comment" rows="4" placeholder="Tell us what you think..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const productNameFromUrl = urlParams.get('product') || 'Our Product';
  document.getElementById('pageTitle').textContent = 'Review: ' + productNameFromUrl;

  const reviewerToken = localStorage.getItem('reviewerToken');
  const reviewerData = JSON.parse(localStorage.getItem('reviewerData') || '{}');

  if (reviewerToken && reviewerData.id) {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('feedbackSection').classList.add('active');
    document.getElementById('reviewerInfo').innerHTML = 'Logged in as: ' + (reviewerData.name || reviewerData.email) + ' <a href="reviewer-dashboard.html" class="ms-2 btn btn-sm btn-outline-primary">My Profile</a>';
  }

  async function loadProductReviews() {
    try {
      const res = await fetch('/api/reviews');
      const reviews = await res.json();
      const productReviews = reviews.filter(r => r.productName === productNameFromUrl);
      const listDiv = document.getElementById('reviewsList');
      if (productReviews.length === 0) return;
      document.getElementById('reviewsSection').style.display = 'block';
      listDiv.innerHTML = productReviews.map(r => '<div class="card mb-2"><div class="card-body"><strong>' + (r.reviewerName || 'Anonymous') + '</strong> ' + '★'.repeat(r.rating) + '<p class="mb-0 mt-2">' + r.comment + '</p></div></div>').join('');
    } catch (err) {}
  }
  loadProductReviews();

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch('/api/reviewers/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (res.ok) { localStorage.setItem('reviewerToken', data.token); localStorage.setItem('reviewerData', JSON.stringify(data.reviewer)); location.reload(); }
      else { document.getElementById('authError').textContent = data.message || 'Login failed'; document.getElementById('authError').classList.remove('d-none'); }
    } catch(err) { document.getElementById('authError').textContent = 'Server error'; document.getElementById('authError').classList.remove('d-none'); }
  });

  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    try {
      const res = await fetch('/api/reviewers/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) });
      const data = await res.json();
      if (res.ok) { localStorage.setItem('reviewerToken', data.token); localStorage.setItem('reviewerData', JSON.stringify(data.reviewer)); location.reload(); }
      else { document.getElementById('authError').textContent = data.message || 'Registration failed'; document.getElementById('authError').classList.remove('d-none'); }
    } catch(err) { document.getElementById('authError').textContent = 'Server error'; document.getElementById('authError').classList.remove('d-none'); }
  });

  function logoutReviewer() { localStorage.removeItem('reviewerToken'); localStorage.removeItem('reviewerData'); location.reload(); }

  const stars = document.querySelectorAll('#starContainer span');
  const ratingInput = document.getElementById('rating');
  stars.forEach(star => {
    star.addEventListener('click', function() {
      ratingInput.value = this.getAttribute('data-value');
      stars.forEach(s => s.classList.toggle('active', parseInt(s.getAttribute('data-value')) <= ratingInput.value));
    });
  });

  document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!ratingInput.value) { alert('Please select a star rating'); return; }
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    try {
      const res = await fetch('/api/reviews', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + reviewerToken },
        body: JSON.stringify({ productName: productNameFromUrl, reviewer: reviewerData.id, reviewerName: reviewerData.name, reviewerEmail: reviewerData.email, rating: parseInt(ratingInput.value), comment: document.getElementById('comment').value.trim() })
      });
      if (res.ok) window.location.href = 'thankyou.html?product=' + encodeURIComponent(productNameFromUrl);
    } catch(err) { alert('Error submitting review'); }
    btn.disabled = false;
  });
</script>
</body>
</html>
