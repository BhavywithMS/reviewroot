<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - ReviewRoot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .profile-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 40px 0; margin-bottom: 30px; }
    .profile-avatar { width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #4f46e5; font-weight: bold; }
    .stat-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .review-card { transition: all 0.2s; }
    .review-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#"><i class="bi bi-chat-square-text me-2"></i>ReviewRoot</a>
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-light btn-sm me-2" onclick="openSettings()"><i class="bi bi-gear"></i> Settings</button>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Profile Header -->
  <div class="profile-header text-center">
    <div class="container">
      <div class="profile-avatar mx-auto mb-3" id="profileAvatar">U</div>
      <h2 id="profileName">User Name</h2>
      <p class="mb-0 opacity-75" id="profileEmail">user@email.com</p>
      <p class="small mt-2" id="memberSince">Member since: -</p>
    </div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-card text-center">
          <div class="text-muted small">Total Reviews</div>
          <h3 class="mb-0" id="totalMyReviews">0</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card text-center">
          <div class="text-muted small">Products Reviewed</div>
          <h3 class="mb-0" id="productsReviewed">0</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card text-center">
          <div class="text-muted small">Average Rating Given</div>
          <h3 class="mb-0" id="avgRatingGiven">-</h3>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-lightning me-2"></i>Quick Actions</h5>
      </div>
      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-3">
            <button class="btn btn-outline-primary w-100" onclick="showAllReviews()">
              <i class="bi bi-list-ul d-block mb-1"></i>My Reviews
            </button>
          </div>
          <div class="col-md-3">
            <button class="btn btn-outline-success w-100" onclick="exportMyReviews()">
              <i class="bi bi-download d-block mb-1"></i>Export Reviews
            </button>
          </div>
          <div class="col-md-3">
            <button class="btn btn-outline-warning w-100" onclick="openEditProfile()">
              <i class="bi bi-pencil d-block mb-1"></i>Edit Profile
            </button>
          </div>
          <div class="col-md-3">
            <button class="btn btn-outline-info w-100" onclick="openChangePassword()">
              <i class="bi bi-key d-block mb-1"></i>Change Password
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- My Reviews Timeline -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>My Review History</h5>
        <div class="d-flex gap-2">
          <select id="myReviewsFilter" class="form-select form-select-sm" style="width: 150px;">
            <option value="">All Products</option>
          </select>
          <select id="myReviewsSort" class="form-select form-select-sm" style="width: 130px;">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="highest">Highest Rating</option>
            <option value="lowest">Lowest Rating</option>
          </select>
        </div>
      </div>
      <div class="card-body">
        <div id="myReviewsList">
          <p class="text-muted text-center py-4">Loading your reviews...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal fade" id="settingsModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Account Settings</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="text-center mb-4">
            <div class="profile-avatar mx-auto mb-3" id="settingsAvatar" style="width: 80px; height: 80px; font-size: 2rem;">U</div>
            <h5 id="settingsName">User Name</h5>
            <p class="text-muted mb-0" id="settingsEmail">user@email.com</p>
          </div>
          <hr>
          <button class="btn btn-outline-primary w-100 mb-2" onclick="openEditProfile()">
            <i class="bi bi-pencil me-2"></i>Edit Profile
          </button>
          <button class="btn btn-outline-warning w-100 mb-2" onclick="openChangePassword()">
            <i class="bi bi-key me-2"></i>Change Password
          </button>
          <button class="btn btn-outline-success w-100" onclick="exportMyReviews()">
            <i class="bi bi-download me-2"></i>Export My Reviews
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="editName">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword">
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="changePassword()">Change Password</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast" role="alert">
      <div class="toast-header">
        <strong class="me-auto">Notification</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('reviewerToken');
    const reviewerData = JSON.parse(localStorage.getItem('reviewerData') || '{}');

    if (!token) window.location.href = '/feedback.html';

    let myReviews = [];
    let settingsModal, editProfileModal, changePasswordModal;

    document.addEventListener('DOMContentLoaded', function() {
      settingsModal = new bootstrap.Modal(document.getElementById('settingsModal'));
      editProfileModal = new bootstrap.Modal(document.getElementById('editProfileModal'));
      changePasswordModal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
      loadProfile();
      loadMyReviews();
    });

    function showToast(message, type = 'success') {
      const toastEl = document.getElementById('toast');
      const toastBody = document.getElementById('toastBody');
      toastBody.textContent = message;
      toastEl.className = 'toast bg-' + type + ' text-white';
      new bootstrap.Toast(toastEl).show();
    }

    function logout() {
      localStorage.removeItem('reviewerToken');
      localStorage.removeItem('reviewerData');
      window.location.href = '/feedback.html';
    }

    function openSettings() {
      settingsModal.show();
    }

    async function loadProfile() {
      try {
        const res = await fetch('/api/reviewers/profile', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          const profile = await res.json();
          document.getElementById('profileName').textContent = profile.name;
          document.getElementById('profileEmail').textContent = profile.email;
          document.getElementById('profileAvatar').textContent = (profile.name || 'U').charAt(0).toUpperCase();
          document.getElementById('settingsName').textContent = profile.name;
          document.getElementById('settingsEmail').textContent = profile.email;
          document.getElementById('settingsAvatar').textContent = (profile.name || 'U').charAt(0).toUpperCase();
          document.getElementById('editName').value = profile.name;
          document.getElementById('editEmail').value = profile.email;
          
          const date = new Date(profile.createdAt).toLocaleDateString();
          document.getElementById('memberSince').textContent = 'Member since: ' + date;
        }
      } catch (err) { console.log(err); }
    }

    async function loadMyReviews() {
      try {
        const res = await fetch('/api/reviewers/my-reviews', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        myReviews = await res.json();
        
        document.getElementById('totalMyReviews').textContent = myReviews.length;
        
        const uniqueProducts = [...new Set(myReviews.map(r => r.productName))].filter(Boolean);
        document.getElementById('productsReviewed').textContent = uniqueProducts.length;
        
        const avg = myReviews.length ? (myReviews.reduce((sum, r) => sum + r.rating, 0) / myReviews.length).toFixed(1) : '-';
        document.getElementById('avgRatingGiven').textContent = avg === '-' ? '-' : '★ ' + avg;
        
        // Populate filter
        const filter = document.getElementById('myReviewsFilter');
        filter.innerHTML = '<option value="">All Products</option>' + 
          uniqueProducts.map(p => '<option value="' + p + '">' + p + '</option>').join('');
        
        applyMyReviewsFilter();
      } catch (err) {
        document.getElementById('myReviewsList').innerHTML = '<p class="text-danger">Failed to load reviews</p>';
      }
    }

    function renderMyReviews(reviews) {
      const list = document.getElementById('myReviewsList');
      if (!reviews.length) {
        list.innerHTML = '<p class="text-muted text-center py-4">You haven\'t given any reviews yet.</p>';
        return;
      }
      
      list.innerHTML = reviews.map(r => {
        const date = new Date(r.createdAt).toLocaleDateString();
        const shareText = 'I just reviewed ' + r.productName + '! Rating: ' + '★'.repeat(r.rating) + ' - ' + r.comment;
        return '<div class="card review-card mb-3"><div class="card-body"><div class="d-flex justify-content-between align-items-start mb-2"><div><span class="badge bg-primary me-2">' + r.productName + '</span><small class="text-muted">' + date + '</small></div><div>' + '★'.repeat(r.rating) + '</div></div><p class="mb-2">"' + r.comment + '"</p><button class="btn btn-sm btn-outline-primary" onclick="shareReview(\'' + encodeURIComponent(shareText) + '\')"><i class="bi bi-share"></i> Share</button></div></div>';
      }).join('');
    }

    function applyMyReviewsFilter() {
      const product = document.getElementById('myReviewsFilter').value;
      const sort = document.getElementById('myReviewsSort').value;
      
      let filtered = myReviews.filter(r => !product || r.productName === product);
      
      if (sort === 'highest') filtered.sort((a, b) => b.rating - a.rating);
      else if (sort === 'lowest') filtered.sort((a, b) => a.rating - b.rating);
      else if (sort === 'newest') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      
      renderMyReviews(filtered);
    }

    document.getElementById('myReviewsFilter').addEventListener('change', applyMyReviewsFilter);
    document.getElementById('myReviewsSort').addEventListener('change', applyMyReviewsFilter);

    function showAllReviews() {
      document.getElementById('myReviewsFilter').value = '';
      document.getElementById('myReviewsSort').value = 'newest';
      applyMyReviewsFilter();
    }

    window.shareReview = function(text) {
      const decoded = decodeURIComponent(text);
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(decoded), '_blank');
    };

    window.exportMyReviews = function() {
      if (!myReviews.length) { showToast('No reviews to export', 'danger'); return; }
      let csv = 'Product,Rating,Comment,Date\n';
      myReviews.forEach(r => {
        csv += '"' + r.productName + '",' + r.rating + ',"' + (r.comment || '') + '","' + r.createdAt + '"\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my_reviews.csv';
      a.click();
      showToast('Reviews exported!');
    };

    window.openEditProfile = async function() {
      settingsModal.hide();
      try {
        const res = await fetch('/api/reviewers/profile', { headers: { 'Authorization': 'Bearer ' + token } });
        const profile = await res.json();
        document.getElementById('editName').value = profile.name || '';
        document.getElementById('editEmail').value = profile.email || '';
      } catch (e) {}
      editProfileModal.show();
    };

    window.saveProfile = async function() {
      const name = document.getElementById('editName').value.trim();
      const email = document.getElementById('editEmail').value.trim();
      
      try {
        const res = await fetch('/api/reviewers/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ name, email })
        });
        
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('reviewerData', JSON.stringify(data));
          editProfileModal.hide();
          loadProfile();
          showToast('Profile updated!');
        } else {
          showToast(data.message || 'Update failed', 'danger');
        }
      } catch (err) { showToast('Server error', 'danger'); }
    };

    window.openChangePassword = function() {
      settingsModal.hide();
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      changePasswordModal.show();
    };

    window.changePassword = async function() {
      const current = document.getElementById('currentPassword').value;
      const newPass = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      
      if (newPass !== confirm) { showToast('Passwords do not match', 'danger'); return; }
      if (newPass.length < 6) { showToast('Password must be at least 6 characters', 'danger'); return; }
      
      try {
        const res = await fetch('/api/reviewers/password', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ currentPassword: current, newPassword: newPass })
        });
        
        const data = await res.json();
        if (res.ok) {
          changePasswordModal.hide();
          showToast('Password changed!');
        } else {
          showToast(data.message || 'Failed to change password', 'danger');
        }
      } catch (err) { showToast('Server error', 'danger'); }
    };
  </script>
</body>
</html>
